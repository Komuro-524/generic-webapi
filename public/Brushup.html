<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idea Lens — アイデアブラッシュアップ</title>
    <style>
        :root { --ink:#17201c; --muted:#66716b; --paper:#f4f1e9; --card:#fffdf7; --line:#dcd8cc; --green:#174c3c; --lime:#d9ef8b; --orange:#ef7e56; }
        * { box-sizing:border-box; }
        body { margin:0; min-height:100vh; color:var(--ink); background:var(--paper); font-family:"Hiragino Sans","Yu Gothic",system-ui,sans-serif; }
        body::before { content:""; position:fixed; inset:0; z-index:-1; opacity:.36; background-image:radial-gradient(#bcb8ac 1px,transparent 1px); background-size:22px 22px; }
        button,input,textarea { font:inherit; }
        .shell { width:min(1180px,calc(100% - 32px)); margin:auto; padding:24px 0 64px; }
        header { display:flex; align-items:center; justify-content:space-between; gap:20px; padding:10px 0 28px; }
        .brand { display:flex; align-items:center; gap:12px; font-weight:900; letter-spacing:-.04em; font-size:20px; }
        .brand-mark { display:grid; place-items:center; width:38px; height:38px; border-radius:50%; color:var(--lime); background:var(--green); }
        .back { color:var(--ink); font-size:14px; text-underline-offset:4px; }
        .hero { display:grid; grid-template-columns:1.1fr .9fr; gap:42px; align-items:end; padding:42px 0 50px; border-top:1px solid var(--line); }
        .kicker { margin:0 0 14px; color:var(--green); font-size:12px; font-weight:900; letter-spacing:.16em; text-transform:uppercase; }
        h1 { margin:0; max-width:760px; font-family:Georgia,"Yu Mincho",serif; font-size:clamp(42px,7vw,82px); font-weight:500; line-height:.98; letter-spacing:-.055em; }
        .hero-copy { margin:0 0 6px; color:var(--muted); line-height:1.9; }
        .composer { display:grid; grid-template-columns:1fr 1fr; gap:16px; padding:24px; border:1px solid var(--line); border-radius:22px; background:rgba(255,253,247,.93); box-shadow:0 22px 60px rgba(40,48,43,.08); }
        .field { display:grid; gap:8px; }
        .wide { grid-column:1/-1; }
        label { font-size:13px; font-weight:800; }
        .optional { color:var(--muted); font-weight:500; }
        input,textarea { width:100%; border:1px solid var(--line); border-radius:10px; padding:12px 14px; color:var(--ink); background:#fff; transition:.2s; }
        textarea { min-height:84px; resize:vertical; line-height:1.6; }
        #idea { min-height:142px; font-size:17px; }
        input:focus,textarea:focus { outline:none; border-color:var(--green); box-shadow:0 0 0 3px rgba(23,76,60,.12); }
        .form-actions { grid-column:1/-1; display:flex; align-items:center; justify-content:space-between; gap:16px; }
        .hint { margin:0; color:var(--muted); font-size:12px; }
        .primary { min-height:52px; border:0; border-radius:999px; padding:0 24px; color:#fff; background:var(--green); font-weight:900; cursor:pointer; box-shadow:inset 0 0 0 1px rgba(255,255,255,.12); }
        .primary:hover { background:#0d3a2d; transform:translateY(-1px); }
        .primary:disabled { opacity:.55; cursor:wait; transform:none; }
        .status { display:flex; align-items:center; gap:12px; margin:24px 0; padding:18px 20px; border:1px solid var(--line); border-radius:14px; background:var(--card); }
        .spinner { width:20px; height:20px; border:3px solid #dce4d5; border-top-color:var(--green); border-radius:50%; animation:spin .8s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .results { margin-top:38px; }
        .results-head { display:flex; justify-content:space-between; align-items:end; gap:20px; margin-bottom:18px; }
        h2 { margin:0; font-family:Georgia,"Yu Mincho",serif; font-size:clamp(28px,4vw,48px); font-weight:500; letter-spacing:-.035em; }
        .ghost { border:0; padding:8px 0; color:var(--muted); background:none; text-decoration:underline; text-underline-offset:4px; cursor:pointer; }
        .summary { margin-bottom:16px; padding:26px; border-radius:18px; color:#fff; background:var(--green); }
        .summary .section-label { color:var(--lime); }
        .summary p { margin:8px 0 0; font-size:19px; line-height:1.75; }
        .grid { display:grid; grid-template-columns:repeat(12,1fr); gap:16px; }
        .card { grid-column:span 6; padding:22px; border:1px solid var(--line); border-radius:18px; background:var(--card); }
        .full { grid-column:1/-1; }
        .section-label { margin:0 0 12px; color:var(--green); font-size:11px; font-weight:900; letter-spacing:.13em; text-transform:uppercase; }
        h3 { margin:0 0 14px; font-size:21px; }
        h4 { margin:0 0 8px; font-size:16px; }
        p { line-height:1.7; }
        .clean-list { margin:0; padding-left:20px; }
        .clean-list li { margin:8px 0; line-height:1.65; }
        .case-grid,.persona-grid,.improvement-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
        .mini { padding:16px; border:1px solid var(--line); border-radius:12px; background:#fff; }
        .mini p { margin:7px 0 0; color:#4f5a54; font-size:14px; }
        .tag { display:inline-block; margin-bottom:10px; padding:5px 9px; border-radius:999px; color:var(--green); background:#eaf0df; font-size:11px; font-weight:800; }
        .scores { display:grid; gap:11px; }
        .score-row { display:grid; grid-template-columns:120px 110px 1fr; gap:14px; align-items:center; }
        .dots { display:flex; gap:5px; }
        .dot { width:14px; height:14px; border:1px solid #b8bdb6; border-radius:50%; }
        .dot.on { border-color:var(--orange); background:var(--orange); }
        .score-copy { margin:0; color:#4f5a54; font-size:14px; }
        .gap-box { display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:16px; }
        .audience { padding:16px; border-radius:12px; background:#edf2e5; }
        .arrow { color:var(--orange); font-size:26px; }
        .priority-high { color:#8d2e19; background:#fbe3d9; } .priority-mid { color:#705900; background:#f8edbd; } .priority-low { color:#315367; background:#dcebf1; }
        .error { color:#8d2e19; border-color:#e4b6a9; background:#fff3ef; }
        [hidden] { display:none !important; }
        @media (max-width:850px) { .hero { grid-template-columns:1fr; gap:22px; } .card { grid-column:1/-1; } .case-grid,.persona-grid,.improvement-grid { grid-template-columns:1fr; } }
        @media (max-width:600px) { .shell { width:min(100% - 20px,1180px); } header { padding-bottom:18px; } .hero { padding:30px 0; } .composer { grid-template-columns:1fr; padding:17px; } .wide,.form-actions { grid-column:1; } .form-actions { align-items:stretch; flex-direction:column; } .primary { width:100%; } .score-row { grid-template-columns:95px 90px; } .score-copy { grid-column:1/-1; } .gap-box { grid-template-columns:1fr; } .arrow { transform:rotate(90deg); text-align:center; } }
    </style>
</head>
<body>
    <main class="shell">
        <header><div class="brand"><span class="brand-mark">✦</span> IDEA LENS</div><a class="back" href="/">アプリ一覧へ</a></header>
        <section class="hero">
            <div><p class="kicker">Think wider. Build sharper.</p><h1>そのアイデアを、<br>次の解像度へ。</h1></div>
            <p class="hero-copy">既存事例、実用性、コスト、ユーザー像を横断して分析。思いつきを、検証できるアイデアへ磨き上げます。</p>
        </section>

        <form id="ideaForm" class="composer">
            <div class="field wide"><label for="idea">ブラッシュアップしたいアイデア</label><textarea id="idea" required maxlength="3000" placeholder="例：飲食店の空席をリアルタイムに共有し、近くにいる人へ案内するサービス"></textarea></div>
            <div class="field"><label for="problem">解決したい問題 <span class="optional">任意</span></label><input id="problem" maxlength="500" placeholder="誰の、どんな困りごと？"></div>
            <div class="field"><label for="targetUser">想定ユーザー <span class="optional">任意</span></label><input id="targetUser" maxlength="500" placeholder="例：外出先で店を探す20〜30代"></div>
            <div class="field"><label for="usageScene">利用場面 <span class="optional">任意</span></label><input id="usageScene" maxlength="500" placeholder="いつ、どこで使う？"></div>
            <div class="field"><label for="constraints">制約・補足 <span class="optional">任意</span></label><input id="constraints" maxlength="500" placeholder="予算、技術、期間など"></div>
            <div class="form-actions"><p class="hint">未入力の項目は仮定を明記して分析します。</p><button id="analyzeBtn" class="primary" type="submit">アイデアを分析する →</button></div>
        </form>

        <div id="status" class="status" role="status" aria-live="polite" hidden><span class="spinner"></span><span>複数の視点からアイデアを分析しています…</span></div>
        <section id="resultsSection" class="results" hidden>
            <div class="results-head"><div><p class="kicker">Analysis report</p><h2>ブラッシュアップレポート</h2></div><button id="clearBtn" class="ghost" type="button">結果をクリア</button></div>
            <div id="results"></div>
        </section>
    </main>
    <script>
        const form = document.getElementById('ideaForm');
        const button = document.getElementById('analyzeBtn');
        const status = document.getElementById('status');
        const resultsSection = document.getElementById('resultsSection');
        const results = document.getElementById('results');
        let controller = null;

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            const idea = value('idea');
            if (!idea) { document.getElementById('idea').focus(); return; }
            if (controller) controller.abort();
            controller = new AbortController();
            setLoading(true);
            resultsSection.hidden = true;
            try {
                const response = await fetch('/api/', {
                    method:'POST', headers:{'Content-Type':'application/json'}, signal:controller.signal,
                    body:JSON.stringify({ title:'アイデアブラッシュアップ', promptKey:'brushup', idea,
                        problem:value('problem') || '未入力', targetUser:value('targetUser') || '未入力',
                        usageScene:value('usageScene') || '未入力', constraints:value('constraints') || '未入力' })
                });
                const payload = await response.json();
                if (!response.ok) throw new Error(payload.error || '分析に失敗しました。');
                const analysis = Array.isArray(payload.data) ? payload.data[0] : null;
                if (!analysis) throw new Error('分析結果が空でした。');
                render(analysis);
                resultsSection.hidden = false;
                resultsSection.scrollIntoView({behavior:'smooth',block:'start'});
            } catch (error) {
                if (error.name === 'AbortError') return;
                results.innerHTML = `<div class="status error">分析できませんでした：${escapeHtml(error.message)}</div>`;
                resultsSection.hidden = false;
            } finally { setLoading(false); controller = null; }
        });

        document.getElementById('clearBtn').addEventListener('click', () => { results.innerHTML=''; resultsSection.hidden=true; });
        function value(id) { return document.getElementById(id).value.trim(); }
        function setLoading(on) { status.hidden=!on; button.disabled=on; button.textContent=on?'分析中…':'アイデアを分析する →'; }
        function list(items) { return `<ul class="clean-list">${(items||[]).map(x=>`<li>${escapeHtml(x)}</li>`).join('')}</ul>`; }
        function field(label,text) { return `<p><strong>${label}</strong><br>${escapeHtml(text||'—')}</p>`; }
        function render(a) {
            const cases=(a.similarCases||[]).map(x=>`<article class="mini"><span class="tag">${escapeHtml(x.certainty)}</span><h4>${escapeHtml(x.name)}</h4>${field('概要',x.overview)}${field('似ている点',x.similarity)}${field('違い',x.difference)}</article>`).join('');
            const scores=(a.evaluations||[]).map(x=>`<div class="score-row"><strong>${escapeHtml(x.perspective)}</strong><div class="dots" aria-label="5点中${Number(x.score)}点">${[1,2,3,4,5].map(n=>`<span class="dot ${n<=Number(x.score)?'on':''}"></span>`).join('')}</div><p class="score-copy">${escapeHtml(x.rationale)}<br><small>比較：${escapeHtml(x.comparison)}</small></p></div>`).join('');
            const personas=(a.personas||[]).map(x=>`<article class="mini"><h4>${escapeHtml(x.profile)}</h4>${field('期待できる効果',x.benefit)}${field('障壁',x.barrier)}${field('利用意向',x.interest)}${field('改善策',x.improvement)}</article>`).join('');
            const improvements=(a.improvements||[]).map(x=>{const c=x.priority==='高'?'priority-high':x.priority==='中'?'priority-mid':'priority-low';return `<article class="mini"><span class="tag ${c}">優先度 ${escapeHtml(x.priority)}</span><h4>${escapeHtml(x.title)}</h4>${field('具体的な行動',x.action)}${field('期待効果',x.effect)}${field('難易度',x.difficulty)}</article>`}).join('');
            const plans=(a.validationPlan||[]).map((x,i)=>`<article class="mini"><span class="tag">STEP ${i+1}</span>${field('検証方法',x.experiment)}${field('成功指標',x.metric)}${field('判断基準',x.decisionRule)}</article>`).join('');
            results.innerHTML=`
                <article class="summary"><p class="section-label">Idea summary</p><p>${escapeHtml(a.summary)}</p></article>
                <div class="grid">
                    <section class="card"><p class="section-label">Assumptions</p><h3>前提と不足情報</h3>${list(a.assumptions)}</section>
                    <section class="card"><p class="section-label">Audience fit</p><h3>想定ユーザーとのずれ</h3><div class="gap-box"><div class="audience"><strong>想定</strong><p>${escapeHtml(a.audienceGap?.expected||'—')}</p></div><div class="arrow">→</div><div class="audience"><strong>有望</strong><p>${escapeHtml(a.audienceGap?.promising||'—')}</p></div></div>${field('分析',a.audienceGap?.gap)}${field('提案',a.audienceGap?.recommendation)}</section>
                    <section class="card full"><p class="section-label">Existing landscape</p><h3>似ている既存事例</h3><div class="case-grid">${cases}</div></section>
                    <section class="card full"><p class="section-label">Score card</p><h3>多角的な評価</h3><div class="scores">${scores}</div></section>
                    <section class="card full"><p class="section-label">Persona simulation</p><h3>属性別シミュレーション</h3><div class="persona-grid">${personas}</div></section>
                    <section class="card"><p class="section-label">Advantages</p><h3>強み</h3>${list(a.strengths)}</section>
                    <section class="card"><p class="section-label">Risks</p><h3>弱み</h3>${list(a.weaknesses)}</section>
                    <section class="card full"><p class="section-label">Unique angle</p><h3>差別化ポイント</h3>${list(a.differentiators)}</section>
                    <section class="card full"><p class="section-label">Action plan</p><h3>優先度付き改善案</h3><div class="improvement-grid">${improvements}</div></section>
                    <section class="card full"><p class="section-label">Lean validation</p><h3>小さく試す検証プラン</h3><div class="improvement-grid">${plans}</div></section>
                    <section class="card full"><p class="section-label">Open questions</p><h3>確認したい質問</h3>${list(a.questions)}</section>
                </div>`;
        }
        function escapeHtml(v) { return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c])); }
    </script>
</body>
</html>
