<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基本情報技術者試験 対策クイズ</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="quiz.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>基本情報技術者試験 対策クイズ</h1>
        </div>

        <div class="quiz-container">
            <!-- クイズ設定画面 -->
            <div class="quiz-setup" id="quizSetup">
                <div class="form-group">
                    <label for="quizTitle">クイズのタイトル:</label>
                    <input type="text" id="quizTitle" placeholder="例: 基本情報技術者試験 対策クイズ" value="基本情報技術者試験 対策クイズ">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="questionCount">問題数:</label>
                        <input type="number" id="questionCount" min="1" max="20" value="10">
                    </div>
                    
                    <div class="form-group">
                        <button class="btn" onclick="generateQuiz()">クイズを生成</button>
                    </div>
                </div>
            </div>

            <!-- クイズ実行画面 -->
            <div class="quiz-playing" id="quizPlaying">
                <div class="quiz-progress" id="quizProgress"></div>
                <h2 id="quizTitleDisplay"></h2>
                
                <div class="question" id="currentQuestion"></div>
                
                <ul class="selections" id="selections"></ul>
                
                <div class="answer-feedback" id="answerFeedback"></div>
                
                <button class="btn" id="nextBtn" onclick="nextQuestion()" style="display: none;">次の問題</button>
                <button class="btn" id="finishBtn" onclick="showResults()" style="display: none;">結果を見る</button>
            </div>

            <!-- 結果画面 -->
            <div class="quiz-results" id="quizResults">
                <h2>クイズ結果</h2>
                <div class="score" id="finalScore"></div>
                <div class="weakness-analysis" id="weaknessAnalysis"></div>
                <button class="btn" onclick="restartQuiz()">新しいクイズを作成</button>
            </div>
        </div>

        <div class="status" id="status">Ready</div>
        <div class="loading" id="loading">クイズを生成中...</div>
    </div>

    <script>
        let quizData = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let selectedAnswer = null;
        let hasAnswered = false;
        let answerHistory = [];

        // 初期化
        document.addEventListener('DOMContentLoaded', function() {
            updateStatus();
        });

        // ステータス更新
        function updateStatus() {
            const statusEl = document.getElementById('status');
            statusEl.textContent = 'Ready to generate 基本情報技術者試験 quiz';
            statusEl.style.color = '#28a745';
        }

        // クイズ生成
        async function generateQuiz() {
            const title = document.getElementById('quizTitle').value.trim();
            const count = parseInt(document.getElementById('questionCount').value);

            if (!title || count < 1) {
                alert('すべての項目を正しく入力してください');
                return;
            }

            document.getElementById('loading').classList.add('show');

            try {
                const response = await fetch('/api/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        title: title,
                        count: count
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'API error');
                }

                const data = await response.json();
                quizData = data.data;

                if (!Array.isArray(quizData) || quizData.length === 0) {
                    throw new Error('Invalid quiz data format');
                }

                quizData.forEach((question) => {
                    question.domain = inferDomain(question.question, question.selections);
                });

                currentQuestionIndex = 0;
                score = 0;
                answerHistory = [];
                document.getElementById('quizTitleDisplay').textContent = data.title;
                startQuiz();
                
            } catch (error) {
                console.error('Error:', error);
                alert('クイズの生成に失敗しました: ' + error.message);
            } finally {
                document.getElementById('loading').classList.remove('show');
            }
        }

        // クイズ開始
        function startQuiz() {
            document.getElementById('quizSetup').style.display = 'none';
            document.getElementById('quizPlaying').style.display = 'block';
            document.getElementById('quizResults').style.display = 'none';
            showQuestion();
        }

        // 問題表示
        function showQuestion() {
            if (currentQuestionIndex >= quizData.length) {
                showResults();
                return;
            }

            const question = quizData[currentQuestionIndex];
            hasAnswered = false;
            selectedAnswer = null;

            document.getElementById('quizProgress').textContent = 
                `問題 ${currentQuestionIndex + 1} / ${quizData.length}`;
            
            document.getElementById('currentQuestion').textContent = question.question;
            
            const selectionsEl = document.getElementById('selections');
            selectionsEl.innerHTML = '';
            
            question.selections.forEach((selection, index) => {
                const li = document.createElement('li');
                li.className = 'selection-item';
                li.textContent = selection;
                li.onclick = () => selectAnswer(index);
                selectionsEl.appendChild(li);
            });

            document.getElementById('answerFeedback').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('finishBtn').style.display = 'none';
        }

        // 答え選択
        function selectAnswer(index) {
            if (hasAnswered) return;

            selectedAnswer = index;
            hasAnswered = true;

            const question = quizData[currentQuestionIndex];
            const correctAnswer = question.answer;
            const isCorrect = selectedAnswer === correctAnswer;

            if (isCorrect) {
                score++;
            }

            answerHistory.push({
                question: question.question,
                domain: question.domain,
                correct: isCorrect
            });

            const selectionItems = document.querySelectorAll('.selection-item');
            selectionItems.forEach((item, i) => {
                item.onclick = null;
                if (i === correctAnswer) {
                    item.classList.add('correct');
                } else if (i === selectedAnswer && !isCorrect) {
                    item.classList.add('incorrect');
                }
            });

            const feedback = document.getElementById('answerFeedback');
            feedback.style.display = 'block';
            if (isCorrect) {
                feedback.className = 'answer-feedback correct';
                feedback.textContent = '正解！';
            } else {
                feedback.className = 'answer-feedback incorrect';
                feedback.textContent = `不正解。正解は「${question.selections[correctAnswer]}」です。`;
            }

            if (currentQuestionIndex < quizData.length - 1) {
                document.getElementById('nextBtn').style.display = 'inline-block';
            } else {
                document.getElementById('finishBtn').style.display = 'inline-block';
            }
        }

        // 次の問題
        function nextQuestion() {
            currentQuestionIndex++;
            showQuestion();
        }

        // 結果表示
        function showResults() {
            document.getElementById('quizPlaying').style.display = 'none';
            document.getElementById('quizResults').style.display = 'block';
            
            const percentage = Math.round((score / quizData.length) * 100);
            document.getElementById('finalScore').textContent = 
                `${score} / ${quizData.length} 問正解 (${percentage}%)`;
            document.getElementById('weaknessAnalysis').innerHTML = buildWeaknessAnalysis(percentage);
        }

        // クイズリスタート
        function restartQuiz() {
            document.getElementById('quizResults').style.display = 'none';
            document.getElementById('quizSetup').style.display = 'block';
            quizData = [];
            currentQuestionIndex = 0;
            score = 0;
            answerHistory = [];
            selectedAnswer = null;
            hasAnswered = false;
            document.getElementById('answerFeedback').style.display = 'none';
            document.getElementById('weaknessAnalysis').innerHTML = '';
        }

        // 問題文と選択肢から基本情報技術者試験の大分類を推定する
        function inferDomain(questionText, selections) {
            const text = `${questionText} ${(selections || []).join(' ')}`;
            const domainKeywords = {
                'ストラテジ系': [
                    '経営', '戦略', 'SWOT', 'マーケティング', '会計', '財務', '法務', '知的財産',
                    '著作権', '個人情報', '契約', '調達', '業務', 'BPR', 'CRM', 'SCM', 'ERP',
                    'ROI', '損益', '企業', '組織'
                ],
                'マネジメント系': [
                    'プロジェクト', 'PMBOK', 'WBS', '進捗', '品質管理', 'リスク管理', 'サービス',
                    'ITIL', 'SLA', '運用', '監査', 'システム監査', '内部統制', 'テスト計画',
                    '工程', '見積', '保守'
                ],
                'テクノロジ系': [
                    'アルゴリズム', 'データ構造', 'CPU', 'メモリ', 'OS', 'データベース', 'SQL',
                    'ネットワーク', 'TCP', 'IP', 'HTTP', 'セキュリティ', '暗号', '認証',
                    'プログラム', 'ソフトウェア', 'ハードウェア', '正規化', 'UML', 'API',
                    '2進数', '論理演算'
                ]
            };

            let bestDomain = 'テクノロジ系';
            let bestScore = 0;

            Object.entries(domainKeywords).forEach(([domain, keywords]) => {
                const hits = keywords.filter((keyword) => text.includes(keyword)).length;
                if (hits > bestScore) {
                    bestScore = hits;
                    bestDomain = domain;
                }
            });

            return bestDomain;
        }

        // 正答率と誤答分野から苦手分野を表示する
        function buildWeaknessAnalysis(percentage) {
            const domains = ['ストラテジ系', 'マネジメント系', 'テクノロジ系'];
            const stats = domains.map((domain) => {
                const answers = answerHistory.filter((answer) => answer.domain === domain);
                const correct = answers.filter((answer) => answer.correct).length;
                return {
                    domain,
                    total: answers.length,
                    correct,
                    rate: answers.length ? Math.round((correct / answers.length) * 100) : null
                };
            });

            const attemptedStats = stats.filter((item) => item.total > 0);
            const weakest = attemptedStats
                .filter((item) => item.rate < 80)
                .sort((a, b) => a.rate - b.rate || b.total - a.total)[0];

            const rows = stats.map((item) => {
                const value = item.total ? `${item.correct}/${item.total}問 (${item.rate}%)` : '出題なし';
                return `<li><span>${item.domain}</span><strong>${value}</strong></li>`;
            }).join('');

            let message;
            if (!weakest) {
                message = percentage >= 80
                    ? '全体的に安定しています。間違えた問題の用語と選択肢を復習すると、さらに得点を伸ばせます。'
                    : '分野ごとの偏りは小さめです。各問題の正解理由を確認し、知識の抜けを埋めていきましょう。';
            } else {
                message = `今回の苦手分野は「${weakest.domain}」です。この分野の正答率が最も低いため、関連する基本用語と代表的な過去問を重点的に復習しましょう。`;
            }

            return `
                <h3>分野別の振り返り</h3>
                <p>${message}</p>
                <ul>${rows}</ul>
            `;
        }
    </script>
</body>
</html>
